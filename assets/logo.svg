<svg xmlns="http://w3.org" viewBox="0 0 800 350" width="100%" height="100%">
  <!-- Background Context Layer (Emulating Dark Mode Terminal) -->
  <rect width="800" height="350" rx="16" fill="#0B0F19" />

  <!-- Subtle Grid Layout Accent -->
  <g opacity="0.03" stroke="#00FF66" stroke-width="1">
    <line x1="50" y1="0" x2="50" y2="350" />
    <line x1="100" y1="0" x2="100" y2="350" />
    <line x1="150" y1="0" x2="150" y2="350" />
    <line x1="200" y1="0" x2="200" y2="350" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
  </g>

  <!-- DEFINITIONS: Gradients & Glow Filters -->
  <defs>
    <!-- Left Face Gradient: Technical Terminal Green -->
    <linearGradient id="leftFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141E30" />
      <stop offset="100%" stop-color="#0F2027" />
    </linearGradient>

    <!-- Right Face Gradient: Autonomous Core Cyber Purple -->
    <linearGradient id="rightFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D1B3A" />
      <stop offset="100%" stop-color="#0F0C20" />
    </linearGradient>

    <!-- Top Face Gradient: Isolated Cap -->
    <linearGradient id="topFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#243B55" />
      <stop offset="100%" stop-color="#141E30" />
    </linearGradient>

    <!-- Cyan-to-Green Core Gradient -->
    <linearGradient id="neonGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF66" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>

    <!-- Deep Purple-to-Magenta Stream Gradient -->
    <linearGradient id="neonPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDD" />
      <stop offset="100%" stop-color="#FF007A" />
    </linearGradient>

    <!-- High-Tech Core Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- LOGO MARK: THE ABSTRACT CUBE (Left Axis) -->
  <g transform="translate(130, 175)">
    <!-- Isometric Sandbox Base Planes -->
    <polygon points="0,-90 78,-45 0,0 -78,-45" fill="url(#topFaceGrad)" stroke="#1F2937" stroke-width="1" />
    <polygon points="-78,-45 0,0 0,90 -78,45" fill="url(#leftFaceGrad)" stroke="#1F2937" stroke-width="1" />
    <polygon points="0,0 78,-45 78,45 0,90" fill="url(#rightFaceGrad)" stroke="#1F2937" stroke-width="1" />

    <!-- Core Framing Isolation Borders -->
    <polyline points="-78,-45 0,-90 78,-45" fill="none" stroke="#374151" stroke-width="3" stroke-linecap="round" />
    <line x1="-78" y1="45" x2="-78" y2="-45" stroke="url(#neonGreenGrad)" stroke-width="2" opacity="0.4" />
    <line x1="78" y1="45" x2="78" y2="-45" stroke="url(#neonPurpleGrad)" stroke-width="2" opacity="0.4" />
    <polyline points="-78,45 0,90 78,45" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7" />

    <!-- Left Face: Clean Shell Command Interface Input Mapping (>_) -->
    <g transform="translate(-38, 20) skewY(30)">
      <path d="M-15,-20 L-5,-12 L-15,-4" fill="none" stroke="url(#neonGreenGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />
      <line x1="0" y1="-4" x2="12" y2="-4" stroke="#00FF66" stroke-width="4.5" stroke-linecap="round" filter="url(#neonGlow)" />
    </g>

    <!-- Right Face: Abstract Neural Processing Token Strands -->
    <g transform="translate(38, 20) skewY(-30)">
      <circle cx="-10" cy="-20" r="3" fill="#9D4EDD" filter="url(#neonGlow)" />
      <circle cx="15" cy="-12" r="4" fill="#FF007A" filter="url(#neonGlow)" />
      <circle cx="-5" cy="5" r="3" fill="#00E5FF" filter="url(#neonGlow)" />

      <line x1="-10" y1="-20" x2="15" y2="-12" stroke="url(#neonPurpleGrad)" stroke-width="1.5" opacity="0.8" />
      <line x1="-10" y1="-20" x2="-5" y2="5" stroke="url(#neonPurpleGrad)" stroke-width="1.5" opacity="0.6" />
      <line x1="15" y1="-12" x2="-5" y2="5" stroke="url(#neonPurpleGrad)" stroke-width="1.5" opacity="0.8" />

      <path d="M 22,-25 L 28,-25 L 28,12 L 22,12" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.5" />
    </g>

    <!-- Top Face: Core Execution Status Ring -->
    <g transform="translate(0, -45) scale(1, 0.577)">
      <circle cx="0" cy="0" r="32" fill="none" stroke="#1E293B" stroke-width="4" />
      <circle cx="0" cy="0" r="32" fill="none" stroke="url(#neonGreenGrad)" stroke-width="4" stroke-dasharray="60 140" stroke-linecap="round" filter="url(#neonGlow)" />
      <circle cx="0" cy="0" r="18" fill="none" stroke="url(#neonPurpleGrad)" stroke-width="2" stroke-dasharray="30 80" stroke-linecap="round" />
    </g>
  </g>

  <!-- TYPOGRAPHY LAYER: Capitalized Wordmark & Your Custom Slogan -->
  <text x="270" y="190" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="84" font-weight="800" letter-spacing="-2" fill="#FFFFFF">Chatty</text>

  <!-- Sleek Code Accent Line Under Title -->
  <g>
    <line x1="275" y1="215" x2="735" y2="215" stroke="#1F2937" stroke-width="2" stroke-linecap="round" />
    <line x1="275" y1="215" x2="400" y2="215" stroke="url(#neonGreenGrad)" stroke-width="3" stroke-linecap="round" filter="url(#neonGlow)" />
  </g>

  <!-- Your Requested Meta Catchphrase -->
  <text x="275" y="248" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="14" font-weight="600" letter-spacing="4" fill="#9CA3AF" text-transform="uppercase">The AI CLI Agent Coded By AI</text>
</svg>
